name: Build and Deploy

on:
  # Daily at 09:00 UTC = 17:00 Beijing time
  schedule:
    - cron: '0 9 * * *'
  # Manual trigger
  workflow_dispatch:
  # Run on push to main (when summaries are updated)
  push:
    branches:
      - main
    paths:
      - 'data/summaries/**'
      - 'scripts/**'

jobs:
  aggregate-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 1: Pull latest daily summaries from workspace repository
      - name: Pull latest daily summaries
        run: |
          git clone --depth 1 https://github.com/Simidas/Ledazhushou.git /tmp/workspace
          mkdir -p data/summaries/daily
          cp -r /tmp/workspace/memory/summaries/daily/*.json data/summaries/daily/ 2>/dev/null || true
          echo "Copied daily summaries from workspace"

      # Step 2: Run aggregation script
      - name: Run aggregation script
        run: node scripts/aggregate.js

      # Step 3: Configure git
      - name: Configure git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      # Step 4: Commit and push changes (only if there are changes)
      - name: Commit and push changes
        run: |
          git add data/summaries/
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "chore: update summary data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
            echo "Pushed updated summary data"
          fi

      # Step 5: Deploy to Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: summary-dashboard
          directory: .
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
