name: Build and Deploy

on:
  # Daily at 09:00 UTC = 17:00 Beijing time
  schedule:
    - cron: '0 9 * * *'
  # Manual trigger
  workflow_dispatch:
  # Run on push to main (when summaries are updated)
  push:
    branches:
      - main
    paths:
      - 'data/summaries/**'
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  aggregate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for workflow to push changes back to repo
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install wrangler
      - name: Install Wrangler
        run: npm install -g wrangler

      # Configure Cloudflare
      - name: Configure Cloudflare credentials
        run: |
          echo "CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}" > .wf_credentials
          echo "Account ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Run aggregation script
      - name: Run aggregation script
        run: node scripts/aggregate.js

      # Configure git
      - name: Configure git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      # Commit and push changes (only if there are changes)
      - name: Commit and push changes
        run: |
          git add data/summaries/
          if git diff --staged --quiet; then
            echo "No new data to commit"
          else
            git commit -m "chore: update summary data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
            echo "Pushed updated summary data"
          fi

      # Deploy to Cloudflare Workers/Pages
      - name: Deploy to Cloudflare
        run: |
          wrangler pages deploy . --project-name=summary-dashboard --commit-message="${{ github.event.head_commit.message }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
